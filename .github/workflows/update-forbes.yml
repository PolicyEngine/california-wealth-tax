name: Update Forbes data

on:
  schedule:
    - cron: "0 12 * * *" # 12pm UTC / 5am PT daily
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest Forbes data
        run: python scripts/fetch_forbes.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/billionaires_live.json data/billionaires_live_meta.json data/billionaires_live.csv public/snapshots/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update Forbes data ($(date -u +%Y-%m-%d))"
            git push
          fi
